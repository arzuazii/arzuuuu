<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="margin: 0; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; touch-action: none;">

    <p id="sonuc">Puan: 0</p>
    <canvas id="c" width="350" height="500" style="border:2px solid white; background-color: rgb(50, 57, 121); max-width: 95%;"></canvas>

    <script>
        let ctx = document.getElementById("c").getContext("2d");
        let canvas = document.getElementById("c");
        let p = 0; 
        let x = Math.random() * 320; 
        let y = 0; 
        let paddleX = 125; 

        function oyun() {
            ctx.clearRect(0, 0, 350, 500);

           
            ctx.fillStyle = "yellow";
            ctx.fillRect(x, y, 30, 30);
            y += 4; 

           
            ctx.fillStyle = "red";
            ctx.fillRect(paddleX, 460, 100, 20);

          
            if (y > 430 && y < 470 && x > paddleX - 20 && x < paddleX + 100) {
                p++;
                document.getElementById("sonuc").innerText = "Puan: " + p;
                y = 0;
                x = Math.random() * 320;
            }

            if (y > 500) {
                y = 0;
                x = Math.random() * 320;
            }

            requestAnimationFrame(oyun);
        }

       
        function move(e) {
            let rect = canvas.getBoundingClientRect();
            let clientX;
            
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
            } else {
                // Если это мышка
                clientX = e.clientX;
            }
            
            paddleX = clientX - rect.left - 50;
        }

      
        canvas.addEventListener("mousemove", move);
        canvas.addEventListener("touchmove", function(e) {
            move(e);
            e.preventDefault(); 
        }, { passive: false });

        oyun();
    </script>
</body>
</html>
